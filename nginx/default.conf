upstream nextjs {
    server mendeleyev_frontend:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Tashqi nginx dan keladigan real IP
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   0.0.0.0/0;

    # Gzip
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/javascript application/json application/xml
        font/truetype font/opentype image/svg+xml;

    # Next.js static fayllar — abadiy kesh
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public papkadagi statik fayllar
    location /favicon.ico {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Next.js HMR / WebSocket (agar kerak bo'lsa)
    location /_next/webpack-hmr {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Asosiy proxy
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        proxy_set_header Upgrade          $http_upgrade;
        proxy_set_header Connection       "upgrade";
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;

        # Cache-Control — Next.js o'zi boshqaradi
        proxy_cache_bypass $http_upgrade;
    }
}
